{{/* squareimg: crops to a square thumbnail, links to full image */}}
{{- $src := .Get "src" -}}
{{- $alt := .Get "alt" | default "" -}}
{{- $class := .Get "class" | default "" -}}

{{- if not $src -}}
  <p><strong>squareimg shortcode:</strong> missing required parameter 'src'.</p>
{{- else -}}
  <a href="{{ $src | relURL }}" class="fdw-lightbox-link {{ $class }}" data-lightbox="image" aria-label="Open image">
    <img src="{{ $src | relURL }}" alt="{{ $alt }}" loading="lazy" decoding="async" class="fdw-square-img">
  </a>
{{- end -}}
